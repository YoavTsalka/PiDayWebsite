<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התחברות מנהל - יום הפאי</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input[type="password"] { padding: 10px; font-size: 16px; margin: 15px 0; border: 2px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { background-color: #314159; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c3e50; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>אזור ניהול (Admin)</h2>
        <p>הזן סיסמת מנהל כדי להיכנס למצב עריכה</p>
        <form method="POST">
            <input type="password" name="password" placeholder="סיסמה..." required>
            <button type="submit">התחברות</button>
        </form>
    </div>
</body>
</html>
